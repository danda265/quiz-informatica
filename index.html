<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercícios — Informática Básica</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4f8;--card:#fff;--text:#2c3e50;--muted:#7f8c8d;
  --border:#d1d5db;--ok:#27ae60;--err:#e74c3c;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;padding:16px}
[hidden]{display:none!important}

/* ── topo ── */
.topbar{text-align:center;margin-bottom:20px}
.topbar h1{color:#1a5276;font-size:1.4rem;font-weight:700}
.topbar p{color:var(--muted);font-size:.85rem;margin-top:3px}

/* ── card genérico ── */
.card{background:var(--card);border-radius:16px;padding:28px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:640px;margin:0 auto}

/* ── grid de módulos ── */
.mod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  max-width:720px;margin:0 auto}
@media(max-width:520px){.mod-grid{grid-template-columns:repeat(2,1fr)}}
.mod-card{background:var(--card);border-radius:14px;padding:18px 12px;
  text-align:center;cursor:pointer;border:2px solid transparent;
  box-shadow:0 2px 10px rgba(0,0,0,.07);transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:6px}
.mod-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.13)}
.mod-emoji{font-size:1.8rem;line-height:1}
.mod-num{font-size:.72rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.mod-name{font-size:.88rem;font-weight:600;color:var(--text);line-height:1.3}

/* ── tela nome ── */
.back-btn{display:flex;align-items:center;gap:6px;color:#2e86c1;
  background:none;border:none;cursor:pointer;font-size:.9rem;
  font-weight:600;margin-bottom:20px;padding:0}
.back-btn:hover{text-decoration:underline}
.mod-banner{display:flex;align-items:center;gap:12px;padding:14px;
  border-radius:10px;margin-bottom:20px;color:#fff;font-weight:600;font-size:1rem}
.mod-banner .big-emoji{font-size:1.6rem}
label{display:block;font-weight:600;color:var(--text);margin-bottom:8px}
input[type=text]{width:100%;padding:13px 15px;border:2px solid var(--border);
  border-radius:10px;font-size:1rem;color:var(--text);outline:none;
  transition:border-color .2s}
input[type=text]:focus{border-color:#2e86c1}

/* ── botões ── */
.btn{width:100%;padding:13px;border:none;border-radius:10px;
  font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:16px}
.btn-primary{background:#1a5276;color:#fff}
.btn-primary:hover:not(:disabled){background:#2e86c1;transform:translateY(-1px)}
.btn-primary:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.btn-secondary{background:transparent;color:#1a5276;border:2px solid #1a5276}
.btn-secondary:hover{background:#1a5276;color:#fff}

/* ── quiz ── */
.prog-row{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-row span{font-size:.82rem;color:var(--muted);font-weight:600}
.prog-bar{height:6px;background:var(--border);border-radius:3px;
  margin-bottom:24px;overflow:hidden}
.prog-fill{height:100%;background:#2e86c1;border-radius:3px;transition:width .4s}
.qtag{font-size:.75rem;font-weight:700;letter-spacing:.4px;
  text-transform:uppercase;margin-bottom:10px}
.qtext{font-size:1.06rem;font-weight:600;color:var(--text);
  line-height:1.55;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
.opt{display:flex;align-items:center;gap:11px;padding:12px 14px;
  border:2px solid var(--border);border-radius:10px;cursor:pointer;
  transition:all .18s;background:#fff;user-select:none}
.opt:hover:not(.sel){border-color:#2e86c1;background:#f0f8ff}
.opt.sel{border-color:#1a5276;background:#e8f4fd}
.opt-l{width:30px;height:30px;border-radius:50%;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.85rem;color:var(--muted);flex-shrink:0;transition:all .18s}
.opt.sel .opt-l{background:#1a5276;color:#fff}
.opt-t{font-size:.92rem;color:var(--text);line-height:1.4}

/* ── resultado ── */
.res-header{text-align:center;margin-bottom:22px}
.score-circle{width:108px;height:108px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 12px;color:#fff}
.score-n{font-size:2rem;font-weight:800;line-height:1}
.score-t{font-size:.8rem;opacity:.85}
.res-header h2{color:#1a5276;font-size:1.2rem}
.res-header p{color:var(--muted);margin-top:3px;font-size:.9rem}
.save-msg{text-align:center;font-size:.82rem;padding:7px 12px;
  border-radius:8px;background:var(--bg);color:var(--muted);margin-bottom:16px}
.rev-list{display:flex;flex-direction:column;gap:7px;
  max-height:320px;overflow-y:auto;margin-bottom:20px;padding-right:2px}
.rev-list::-webkit-scrollbar{width:4px}
.rev-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.rev-item{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;
  border-radius:8px;font-size:.87rem}
.rev-item.ok{background:#f0fdf4;border-left:3px solid var(--ok)}
.rev-item.er{background:#fff5f5;border-left:3px solid var(--err)}
.rev-icon{flex-shrink:0;margin-top:1px}
.rev-ans{font-size:.79rem;color:var(--ok);margin-top:2px;font-weight:500}
</style>
</head>

<div class="topbar">
  <h1>Informática Básica</h1>
  <p>Prof. Anderson Rodrigo Costa — CEM Santa</p>
</div>

<!-- ══ TELA 1: grade de módulos ══ -->
<div id="s-modules">
  <div class="mod-grid" id="mod-grid"></div>
</div>

<!-- ══ TELA 2: digitar nome ══ -->
<div class="card" id="s-name" hidden>
  <button class="back-btn" onclick="goModules()">← Voltar</button>
  <div class="mod-banner" id="name-banner"></div>
  <div style="margin-bottom:4px">
    <label for="inp-name">Seu nome completo</label>
    <input type="text" id="inp-name" placeholder="Digite seu nome..." autocomplete="name"/>
  </div>
  <button class="btn btn-primary" onclick="startQuiz()">Começar →</button>
</div>

<!-- ══ TELA 3: questão ══ -->
<div class="card" id="s-quiz" hidden>
  <div class="prog-row">
    <span id="prog-txt">Questão 1 de 10</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="qtag" id="q-module-tag"></div>
  <div class="qtext" id="q-text"></div>
  <div class="options" id="options"></div>
  <button class="btn btn-primary" id="btn-next" onclick="nextQ()" disabled>Avançar →</button>
</div>

<!-- ══ TELA 4: resultado ══ -->
<div class="card" id="s-result" hidden>
  <div class="res-header">
    <div class="score-circle" id="res-circle">
      <div class="score-n" id="res-n">0</div>
      <div class="score-t" id="res-t">de 10</div>
    </div>
    <h2 id="res-title">Parabéns!</h2>
    <p id="res-msg"></p>
  </div>
  <div class="save-msg" id="save-msg">Salvando…</div>
  <div class="rev-list" id="rev-list"></div>
  <button class="btn btn-primary" onclick="goModules()">Escolher outro Módulo</button>
  <button class="btn btn-secondary" onclick="retryModule()">Tentar este Módulo novamente</button>
</div>

// ════════════════════════════════════════════
// ESTADO E LÓGICA
// ════════════════════════════════════════════
const LETTERS = ["A","B","C","D"];
let selMod = null, studentName = "", curIdx = 0, selOpt = null, answers = [], quizQs = [];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── Renderizar grade ──
function buildGrid(){
  const grid=document.getElementById("mod-grid");
  grid.innerHTML="";
  MODULES.forEach(m=>{
    const d=document.createElement("div");
    d.className="mod-card";
    d.style.borderColor=m.color;
    d.innerHTML=`
      <div class="mod-emoji">${m.emoji}</div>
      <div class="mod-num" style="color:${m.color}">Módulo ${m.id}</div>
      <div class="mod-name">${m.name}</div>`;
    d.addEventListener("click",()=>openModule(m));
    grid.appendChild(d);
  });
}

// ── Selecionar módulo ──
function openModule(m){
  selMod=m;
  const banner=document.getElementById("name-banner");
  banner.style.background=m.color;
  banner.innerHTML=`<span class="big-emoji">${m.emoji}</span> Módulo ${m.id} — ${m.name}`;
  document.getElementById("inp-name").value="";
  show("s-name"); hide("s-modules");
}

function goModules(){
  hide("s-name"); hide("s-quiz"); hide("s-result");
  show("s-modules");
}

// ── Iniciar quiz ──
function startQuiz(){
  studentName=document.getElementById("inp-name").value.trim();
  if(!studentName){
    const i=document.getElementById("inp-name");
    i.style.borderColor="#e74c3c"; i.focus(); return;
  }
  curIdx=0; selOpt=null; answers=[];
  quizQs=shuffle(selMod.questions);
  show("s-quiz"); hide("s-name");
  renderQ();
}

function retryModule(){
  hide("s-result"); openModule(selMod);
}

// ── Renderizar questão ──
function renderQ(){
  const q=quizQs[curIdx], tot=quizQs.length, pct=Math.round(curIdx/tot*100);
  document.getElementById("prog-txt").textContent=`Questão ${curIdx+1} de ${tot}`;
  document.getElementById("prog-pct").textContent=`${pct}%`;
  document.getElementById("prog-fill").style.width=`${pct}%`;
  document.getElementById("q-module-tag").textContent=`${selMod.emoji} Módulo ${selMod.id} — ${selMod.name}`;
  document.getElementById("q-module-tag").style.color=selMod.color;
  document.getElementById("q-text").textContent=q.t;

  const box=document.getElementById("options");
  box.innerHTML="";
  q.o.forEach((op,i)=>{
    const d=document.createElement("div");
    d.className="opt";
    d.innerHTML=`<div class="opt-l">${LETTERS[i]}</div><div class="opt-t">${op}</div>`;
    d.addEventListener("click",()=>pickOpt(i));
    box.appendChild(d);
  });

  selOpt=null;
  const btn=document.getElementById("btn-next");
  btn.disabled=true;
  btn.textContent=curIdx===tot-1?"Ver Resultado →":"Avançar →";
}

function pickOpt(i){
  document.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
  document.querySelectorAll(".opt")[i].classList.add("sel");
  selOpt=i;
  document.getElementById("btn-next").disabled=false;
}

function nextQ(){
  if(selOpt===null)return;
  const q=quizQs[curIdx];
  answers.push({text:q.t,sel:selOpt,cor:q.c,ok:selOpt===q.c,opts:q.o});
  curIdx++;
  if(curIdx<quizQs.length){renderQ();}else{showResult();}
}

// ── Resultado ──
function showResult(){
  const score=answers.filter(a=>a.ok).length, tot=answers.length;
  const pct=Math.round(score/tot*100);

  hide("s-quiz"); show("s-result");

  const circle=document.getElementById("res-circle");
  circle.style.background=selMod.color;
  document.getElementById("res-n").textContent=score;
  document.getElementById("res-t").textContent=`de ${tot}`;
  document.getElementById("res-title").textContent=`${studentName} — ${selMod.name}`;
  document.getElementById("res-msg").textContent=msg(pct);

  const list=document.getElementById("rev-list");
  list.innerHTML="";
  answers.forEach((a,i)=>{
    const d=document.createElement("div");
    d.className=`rev-item ${a.ok?"ok":"er"}`;
    d.innerHTML=`<span class="rev-icon">${a.ok?"✅":"❌"}</span>
      <div><div style="color:#2c3e50;line-height:1.4"><strong>Q${i+1}.</strong> ${a.text}</div>
      ${!a.ok?`<div class="rev-ans">Correta: ${LETTERS[a.cor]}) ${a.opts[a.cor]}</div>`:""}</div>`;
    list.appendChild(d);
  });

  saveResult(studentName,score,tot,pct,answers);
}

function msg(p){
  if(p>=90)return"Excelente! Você domina este módulo! 🏆";
  if(p>=70)return"Muito bom! Continue assim! ✨";
  if(p>=50)return"Bom progresso! Revise os erros. 📚";
  return"Continue estudando — você vai melhorar! 💪";
}

async function saveResult(name,score,tot,pct,ans){
  const el=document.getElementById("save-msg");
  if(!db){el.textContent="⚠️ Firebase não configurado — resultado não salvo.";el.style.color="#e74c3c";return;}
  try{
    await db.collection("quiz_resultados").add({
      nome:name, modulo:`Módulo ${selMod.id} — ${selMod.name}`,
      acertos:score, total:tot, percentual:pct,
      data:firebase.firestore.FieldValue.serverTimestamp(),
      questoes:(ans||[]).map(a=>({t:a.text.substring(0,150),ok:a.ok,sel:LETTERS[a.sel],cor:LETTERS[a.cor]}))
    });
    el.textContent=`✅ Salvo: ${name} — ${score}/${tot} (${pct}%)`;
    el.style.color="#27ae60";
  }catch(e){el.textContent=`❌ Erro: ${e.message}`;el.style.color="#e74c3c";}
}

function show(id){document.getElementById(id).hidden=false;}
function hide(id){document.getElementById(id).hidden=true;}

// Enter no campo de nome
document.getElementById("inp-name").addEventListener("keydown",e=>{if(e.key==="Enter")startQuiz();});
document.getElementById("inp-name").addEventListener("input",function(){
  this.style.borderColor=this.value.trim()?"#2e86c1":"#d1d5db";});

buildGrid();
</script>
